server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Hỗ trợ React Router (chuyển hướng mọi request về index.html nếu không tìm thấy file tĩnh)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Giả lập lại chính xác cơ chế Proxy của Vite trên Production
    location /jira-api/ {
        # Bỏ qua kiểm tra chứng chỉ SSL (tương đương secure: false trong Vite)
        proxy_ssl_verify off;
        
        # Đánh lừa Host header (tương đương changeOrigin: true)
        proxy_set_header Host 20.84.97.109:3033;
        
        # GHI ĐÈ ORIGIN VÀ REFERER ĐỂ VƯỢT LỖI 403 CSRF CỦA JIRA SERVER!
        proxy_set_header Origin "https://20.84.97.109:3033";
        proxy_set_header Referer "https://20.84.97.109:3033/";
        
        # Giữ lại các thông tin của client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cắt bỏ tiền tố /jira-api khỏi đường dẫn request
        rewrite ^/jira-api/(.*) /$1 break;
        
        # Chuyển tiếp request đến server Jira
        proxy_pass https://20.84.97.109:3033;
    }
}
